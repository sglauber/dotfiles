import:
 - ~/.config/alacritty/themes/dracula.yml

window:
  padding:
    x: 6
    y: 6

font:
  normal:
    family: FiraCode Nerd Font 
    style: Regular
  bold:
    family: FiraCode Nerd Font
    style: Bold
  italic:
    family: FiraCode Nerd Font
    style: Italic
  bold_italic:
    family: Fira Code Nerd Font
    style: Bold Italic
  size: 10.0

cursor:
  style:
    shape: Block
    blinking: On
